/* subtle architectural skyline silhouette */
.skyline {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 1200px;
  height: 300px;

}

/* thin gold frame */
.frame {
  position: absolute;
  inset: 18px;
  border: 2px solid rgba(212,175,105,0.55);
  pointer-events: none;
}
.frame::before {
  content: "";
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(212,175,105,0.28);
}

/* corner ornaments */
.corner {
  position: absolute;
  width: 46px;
  height: 46px;
  border: 3px solid #d4af69;
}
.corner.tl { top: 30px; left: 30px; border-right:none; border-bottom:none; }
.corner.tr { top: 30px; right: 30px; border-left:none; border-bottom:none; }
.corner.bl { bottom: 30px; left: 30px; border-right:none; border-top:none; }
.corner.br { bottom: 30px; right: 30px; border-left:none; border-top:none; }

.eyebrow {

  font-size: 22px;

}
.eyebrow .rule {

}

.headline {

.subline {

}

/* bottom info bar */
.infobar {
  position: absolute;
  left: 60px;
  right: 60px;

}

.phone-block {

}
.phone-icon {

.phone-icon svg { width: 30px; height: 30px; }
.phone-text .label {

}
.phone-text .number {

.broker-block {
